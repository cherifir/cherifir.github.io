<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Inas ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(135deg, #f5e6d3 0%, #ffe4e1 25%, #fff0f5 50%, #e0f4ff 75%, #d4e8f0 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Decorative elements */
    .deco {
      position: absolute;
      opacity: 0.15;
      font-size: 120px;
      animation: float 6s ease-in-out infinite;
    }

    .deco-1 { top: 10%; left: 5%; animation-delay: 0s; }
    .deco-2 { top: 60%; right: 8%; animation-delay: 2s; }
    .deco-3 { bottom: 15%; left: 12%; animation-delay: 4s; }
    .deco-4 { top: 20%; right: 15%; animation-delay: 1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    /* Container */
    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px);
      padding: 80px 60px;
      border-radius: 30px;
      max-width: 700px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 10;
    }

    /* Main title */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 8vw, 72px);
      font-weight: 900;
      background: linear-gradient(135deg, #ff69b4, #ff1493, #2a9fb5, #0d8da1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      letter-spacing: -1px;
      line-height: 1.2;
    }

    /* Accent elements */
    .sparkle {
      display: inline-block;
      animation: spin 3s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Subtitle/description */
    .description {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      color: #ff69b4;
      margin-bottom: 40px;
      font-style: italic;
    }

    /* Decorative line */
    .divider {
      width: 120px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #2a9fb5, transparent);
      margin: 40px auto;
    }

    /* Supporting text */
    .support-text {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin: 30px 0;
      font-weight: 300;
    }

    /* Button */
    .btn-back {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #ff69b4, #ff1493);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      border: 2px solid #ff69b4;
      cursor: pointer;
    }

    .btn-back:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 105, 180, 0.3);
      background: linear-gradient(135deg, #ff1493, #ff69b4);
    }

    /* Emoji decorations */
    .emojis {
      font-size: 40px;
      margin: 30px 0;
      letter-spacing: 15px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 60px 30px;
      }

      h1 {
        font-size: 36px;
      }

      .description {
        font-size: 24px;
      }

      .deco {
        font-size: 80px;
      }
    }

    /* Additional charm */
    .charm {
      display: inline-block;
      margin: 0 8px;
      color: #ff69b4;
    }
  </style>
</head>
<body>
  <!-- Floating decorations -->
  <div class="deco deco-1">☀️</div>
  <div class="deco deco-2">🌊</div>
  <div class="deco deco-3">🌹</div>
  <div class="deco deco-4">🏝️</div>

  <!-- Main content -->
  <div class="container">
    <h1>
      <span class="sparkle">✨</span>
      Yo Inas
      <span class="sparkle">✨</span>
    </h1>

    <div class="description">
      You're Gorgeous
    </div>

    <div class="divider"></div>

    <div class="emojis">💕 🌸 💕</div>

    <p class="support-text">
      With all the warmth of the Mediterranean sun, <span class="charm">🌊</span> all the beauty of the sea breeze...
    </p>

    <a href="index.html" class="btn-back">← Back to Portfolio</a>
  </div>

  <script>
    // Subtle parallax effect
    document.addEventListener('mousemove', (e) => {
      const decos = document.querySelectorAll('.deco');
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;

      decos.forEach((deco, i) => {
        const factor = (i + 1) * 15;
        deco.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
      });
    });
  </script>
</body>
</html>
